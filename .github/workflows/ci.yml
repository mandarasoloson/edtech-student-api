name: CI Pipeline API EdTech

# ⚡ Le Trigger : quand est-ce que le pipeline se lance ?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Installation des dépendances (Install)
      run: npm ci

    - name: Lancement du Linter (Lint)
      run: npm run lint

    - name: Lancement des Tests (Test)
      run: npm run test